services:
  api:
    build:
      context: ./DotnetWin.Api
      dockerfile: Dockerfile
    container_name: dotnetwin-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=dotnetwin;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      OTEL_SERVICE_NAME: dotnet-win-api
      OTEL_SERVICE_VERSION: "1.0.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: https://collector.gabrielcarvalho.dev
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      # OTEL_EXPORTER_OTLP_HEADERS: Authorization=Basic MTU5ODc2MDpnbGNfZXlKdklqb2lNVFU1T0RjMk1DSXNJbTRpT2lKemRHRmpheTB4TkRRNE5EYzRMVzkwYkhBdGQzSnBkR1V0ZEdWemRHVWlMQ0pySWpvaU5ETnlhSGw0TWxCdk0xVXlPVEEyT0UxNFdFZFlNMnhMSWl3aWJTSTZleUp5SWpvaWNISnZaQzF6WVMxbFlYTjBMVEVpZlgwPQ==
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: dotnetwin-postgres
    environment:
      POSTGRES_DB: dotnetwin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dotnetwin"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dotnetwin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
